<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style/global.css">
</head>
<body>

 <header>
    <h1>Formulir Pendaftaran Seminar</h1>
  </header>

  <main>
    <section>
      <h2>Data Peserta</h2>

      <!-- form: elemen pembungkus semua input -->
      <!-- action & method menentukan ke mana & bagaimana data dikirim -->
      <div class="form-card">
        <form action="#" method="post">

          <div>
            <label for="nama">Nama Depan</label><br>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama depan" required>
          </div>
          
          <div>
            <label for="nama">Nama Belakang</label><br>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama belakang" required>
          </div>

          <div>
          <label for="email">Email</label><br>
          <input type="email" id="email" name="email" placeholder="nama@email.com" required>
        </div>

        <div>
          <label for="nim">NIM</label><br>
          <input type="text" id="nim" name="nim" placeholder="Contoh: 20210001" required>
        </div>

        <div>
          <label for="prodi">Program Studi</label><br>
          <select id="prodi" name="prodi" required>
            <option value="">-- Pilih Program Studi --</option>
            <option value="ti">Teknologi Informasi</option>
            <option value="if">Informatika</option>
            <option value="si">Sistem Informasi</option>
          </select>
        </div>

        <div>
          <p>Jenis Kelamin</p>
          <input type="radio" id="pria" name="gender" value="pria" required>
          <label for="pria">Pria</label>
          <input type="radio" id="wanita" name="gender" value="wanita" required>
          <label for="wanita">Wanita</label>
        </div>

        <div>
          <input type="checkbox" id="setuju" name="setuju" required>
          <label for="setuju">Saya menyetujui syarat dan ketentuan</label>
        </div>

        <div>
          <label for="pesan">Pesan / Pertanyaan</label><br>
          <textarea id="pesan" name="pesan" rows="4" cols="40" placeholder="Tulis pesan Anda di sini..."></textarea>
        </div>

        <button type="submit">Daftar Sekarang</button>
      </form>
      </div>
      
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Program Studi S1 Teknologi Informasi</p>
  </footer>
  

</body>
</html>
